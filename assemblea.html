<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSEMBLEA DEI MAESTRI</title>
    <style>
        /* SFONDO E STRUTTURA BASE - COERENTE CON INDEX.HTML */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Georgia', serif; 
            background-image: url("sfondo.jpg"); 
            background-size: cover; 
            background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        /* PERGAMENA CENTRALE */
        .cornice-pergamena {
            background-color: rgba(255, 252, 240, 0.92); /* Più trasparente */
            border: 6px double #FFD700; /* Bordo dorato elegante */
            border-radius: 20px;
            width: 95%;
            max-width: 1000px;
            max-height: 98vh;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        /* TITOLI */
        h1 { 
            color: #8b0000; 
            font-size: 2rem; 
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .istruzione { 
            font-size: 1.1rem; 
            color: #000; 
            font-weight: bold;
            text-transform: uppercase;
            margin: 10px 0;
        }

        /* GRIGLIA ALLINEATA */
        .griglia-allineata {
            display: flex;
            justify-content: space-around; /* Distribuite equamente */
            gap: 15px;
            margin: 25px 0;
            flex-wrap: nowrap; /* Tassativamente sulla stessa riga */
        }

        /* IL NUOVO RIQUADRO: MOVIMENTO FLUIDO ED ESTETICA CURATA */
        .scatola-medievale {
            background: rgba(255, 255, 255, 0.8); /* Semi-trasparente */
            border: 3px solid #8b4513;
            border-radius: 15px;
            padding: 20px;
            width: 30%; /* Dimensione fissa per l'allineamento */
            box-sizing: border-box;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            
            /* TRANSIZIONE FLUIDA (0.4 secondi) */
            transition: all 0.4s ease-out;
        }

        /* MOVIMENTO HOVER DECENTE (Illuminazione, ingrandimento e rotazione minima) */
        .scatola-medievale:hover {
            transform: scale(1.05) rotateX(2deg) rotateY(-1deg);
            box-shadow: 0 0 25px #FFD700;
            border-color: #FFD700;
            background: rgba(255, 255, 255, 1); /* Diventa solida al passaggio */
        }

        /* ICONE INGRANDITE */
        .icona-gigante { 
            font-size: 6rem; /* Gigante */
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        }
        
        /* TESTI DEI BOX */
        .testo-gilda { 
            font-size: 1.2rem; 
            color: #8b0000; 
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .sotto-testo-gilda {
            font-size: 1rem;
            color: #5d0000;
            text-transform: uppercase;
            font-weight: bold;
            border-top: 1px solid #FFD700;
            padding-top: 3px;
        }

        /* ESEMPI AGGIUNTI IN STAMPATELLO */
        .esempio-testo {
            font-size: 0.9rem;
            color: #444;
            font-style: italic;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 5px;
            display: block;
        }

        /* BOTTONE FINALE */
        .bottone-conferma {
            background: #8b0000;
            color: #FFD700;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            display: inline-block;
            text-transform: uppercase;
            border: 2px solid #FFD700;
            transition: 0.3s;
            margin-top: 10px;
        }

        .bottone-conferma:hover {
            background: #FFD700;
            color: #8b0000;
        }
    </style>
</head>
<body>

    <div class="cornice-pergamena">
        <h1>ASSEMBLEA DEI MAESTRI</h1>
        
        <p class="istruzione">FERMATEVI! PRIMA DI LAVORARE, DECIDETE INSIEME:</p>

        <div class="griglia-allineata">
            <div class="scatola-medievale">
                <span class="icona-gigante">🎨</span>
                <div class="testo-gilda">IL SIMBOLO</div>
                <div class="sotto-testo-gilda">L'IMMAGINE</div>
                <span class="esempio-testo">ES: LA COLOMBA</span>
            </div>

            <div class="scatola-medievale">
                <span class="icona-gigante">🤝</span>
                <div class="testo-gilda">IL VALORE</div>
                <div class="sotto-testo-gilda">L'IDEA</div>
                <span class="esempio-testo">ES: LA PACE</span>
            </div>

            <div class="scatola-medievale">
                <span class="icona-gigante">📢</span>
                <div class="testo-gilda">IL MESSAGGIO</div>
                <div class="sotto-testo-gilda">LA FRASE</div>
                <span class="esempio-testo">ES: RESTIAMO UNITI</span>
            </div>
        </div>

        <p class="istruzione">ACCORDATEVI, POI PASSATE ALL'AZIONE!</p>

        <a href="mappa.html" class="bottone-conferma">HO CAPITO</a>
    </div>

</body>
</html>
