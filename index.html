<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bottega Medievale Digitale 2.0</title>
    <style>
        /* Struttura base a tutto schermo */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Verdana', sans-serif; background-color: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Sfondo con immagine a pieno schermo */
        .sfondo { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("sfondo.jpg"); 
            background-size: cover; 
            background-position: center;
            z-index: 1; 
        }

        /* Contenitore generale (trasparente per non coprire lo sfondo) */
        .contenitore-centrale { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            width: 100%;
        }

        /* Riquadro velato SOLO dietro al Titolo */
        .titolo-area {
            background: rgba(0, 0, 0, 0.7); /* Riquadro velato nero */
            padding: 20px 40px;
            display: inline-block;
            border: 4px solid #FFD700;
            border-radius: 15px;
            margin-bottom: 40px;
        }
        
        h1 { 
            color: #FFD700; 
            font-size: 28px; 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Icona Sole Ridotta con bordo nero */
        .sole-img { 
            width: 150px; /* Dimensione ridotta */
            height: 150px; 
            cursor: pointer; 
            display: inline-block; 
            border-radius: 50%;
            border: 8px solid #000; /* Contorno nero */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
            animation: pulsazione 3s infinite ease-in-out;
        }

        @keyframes pulsazione { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
        }

        /* Pulsante Entra */
        .btn-entra { 
            background-color: #28a745; 
            color: white;
            border: 4px solid black; 
            padding: 20px 40px;
            font-size: 22px; 
            font-weight: bold;
            display: inline-block; 
            cursor: pointer; 
            text-decoration: none;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 6px 0px #1a5928;
            text-transform: uppercase;
        }
        .btn-entra:active { transform: translateY(4px); box-shadow: 0 2px 0px #1a5928; }
    </style>

    <script>
        function naviga() { 
            location.href = 'fase1.html'; 
        }
    </script>
</head>
<body>

    <div class="sfondo"></div>

    <div class="contenitore-centrale">
        
        <div class="titolo-area">
            <h1>La Bottega Medievale Digitale 2.0</h1>
        </div>
        
        <br>
        
        <img src="sole.jpg" alt="Sole" class="sole-img" onclick="naviga()">
        
        <br>
        
        <div onclick="naviga()" class="btn-entra">ENTRA 🏰</div>
    </div>

</body>
</html>
